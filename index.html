<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingreso de Vales de Servicios</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col justify-between p-4">

  <!-- Modal de Autenticación Genérico -->
  <div id="loginModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white p-6 rounded-2xl shadow-xl max-w-sm w-full border border-slate-200">
      <div class="text-center mb-6">
        <div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-3 font-bold text-xl">🔑</div>
        <h2 class="text-lg font-bold text-slate-900">Acceso al Sistema de Vales </h3>
        <h2 class="text-lg font-bold text-slate-900">Alineaciones Bustamante</h2>

        <p class="text-xs text-slate-500">Ingresa con tus credenciales del taller</p>
      </div>
      
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase">Correo Electrónico</label>
          <input type="email" id="loginEmail" required class="mt-1 w-full rounded-lg border-slate-300 p-2.5 border text-sm focus:ring-indigo-500" placeholder="usuario@taller.cl">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase">Contraseña</label>
          <input type="password" id="loginPassword" required class="mt-1 w-full rounded-lg border-slate-300 p-2.5 border text-sm focus:ring-indigo-500" placeholder="••••••••">
        </div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg text-sm transition shadow-sm">
          Iniciar Sesión
        </button>
      </form>
    </div>
  </div>

  <!-- Botones de Navegación y Cerrar Sesión -->
  <div class="flex justify-between items-center w-full max-w-lg mx-auto mb-2">
    <button id="btnCerrarSesion" class="text-xs bg-red-100 hover:bg-red-200 text-red-700 px-3 py-1.5 rounded-lg font-medium transition shadow-sm">
      🚪 Cerrar Sesión
    </button>
    <a href="admin.html" class="text-xs bg-slate-200 hover:bg-slate-300 text-slate-700 px-3 py-1.5 rounded-lg font-medium transition shadow-sm">
      ⚙️ Panel de Control
    </a>
  </div>

  <div class="w-full max-w-lg mx-auto bg-white p-6 rounded-xl shadow-sm border border-slate-200 my-auto">
    <div class="border-b pb-4 border-slate-100 mb-4 text-center">
      <h1 class="text-xl font-bold text-slate-900">VALES ELECTRONICOS DE SERVICIO </h1>
      <p class="text-xs text-slate-500 mt-1">Completa los datos para registrar el servicio</p>
    </div>
    
    <form id="registroForm" class="space-y-4">
      <!-- Empresa -->
      <div>
        <label class="block text-xs font-semibold text-slate-600 uppercase">Nombre de Empresa</label>
        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-bold mb-2">Empresa</label>
          <div class="grid grid-cols-2 gap-3 p-3 border border-gray-300 rounded-lg bg-gray-50">
            <label class="flex items-center space-x-2 cursor-pointer">
              <input type="radio" name="empresa_option" value="Empresa 1" class="w-4 h-4 text-blue-600 focus:ring-blue-500" checked>
              <span class="text-sm font-medium text-gray-800">Empresa 1</span>
            </label>
            
            <label class="flex items-center space-x-2 cursor-pointer">
              <input type="radio" name="empresa_option" value="Empresa 2" class="w-4 h-4 text-blue-600 focus:ring-blue-500">
              <span class="text-sm font-medium text-gray-800">Empresa 2</span>
            </label>
            
            <label class="flex items-center space-x-2 cursor-pointer">
              <input type="radio" name="empresa_option" value="Empresa 3" class="w-4 h-4 text-blue-600 focus:ring-blue-500">
              <span class="text-sm font-medium text-gray-800">Empresa 3</span>
            </label>
            
            <label class="flex items-center space-x-2 cursor-pointer">
              <input type="radio" name="empresa_option" value="Empresa 4" class="w-4 h-4 text-blue-600 focus:ring-blue-500">
              <span class="text-sm font-medium text-gray-800">Empresa 4</span>
            </label>
          </div>
      </div>
        <!-- <input type="text" id="nombre_empresa" required class="mt-1 block w-full rounded-lg border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2.5 border text-sm">
      </div><--> 

      <!-- Vehículo (Marca y Patente) -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase">Marca</label>
          <input type="text" id="marca" placeholder="Ej: Audi" required class="mt-1 block w-full rounded-lg border-slate-300 shadow-sm focus:border-indigo-500 p-2.5 border text-sm">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase">Patente</label>
          <input type="text" id="patente" placeholder="ABCD12" required class="mt-1 block w-full rounded-lg border-slate-300 shadow-sm focus:border-indigo-500 p-2.5 border text-sm uppercase">
        </div>
      </div>

      <!-- Detalle -->
      <div>
        <label class="block text-xs font-semibold text-slate-600 uppercase">Detalle del Servicio</label>
        <textarea id="detalle" rows="3" placeholder="Descripción del trabajo..." class="mt-1 block w-full rounded-lg border-slate-300 shadow-sm focus:border-indigo-500 p-2.5 border text-sm"></textarea>
      </div>

        <!-- Valores -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-slate-600 uppercase">Valor Neto ($)</label>
            <input type="number" id="valor_neto" required class="mt-1 block w-full rounded-lg border-slate-300 shadow-sm focus:border-indigo-500 p-2.5 border text-sm font-semibold" placeholder="Ej: 10000">
          </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase">Valor Total ($)</label>
          <input type="number" id="valor_total" required class="mt-1 block w-full rounded-lg border-slate-300 shadow-sm focus:border-indigo-500 p-2.5 border text-sm font-semibold bg-slate-50" placeholder="Ej: 11900">
        </div>
      </div>

      <!-- Medio de Pago -->
      <div>
        <label class="block text-xs font-semibold text-slate-600 uppercase mb-2">Medio de Pago</label>
        <div class="grid grid-cols-3 gap-2">
          <label class="flex flex-col items-center justify-center p-3 border rounded-lg cursor-pointer hover:bg-slate-50 transition border-slate-200">
            <input type="radio" name="medio_pago" value="Efectivo" checked class="text-indigo-600 focus:ring-indigo-500">
            <span class="text-xs mt-1 font-medium">Efectivo</span>
          </label>
          <label class="flex flex-col items-center justify-center p-3 border rounded-lg cursor-pointer hover:bg-slate-50 transition border-slate-200">
            <input type="radio" name="medio_pago" value="Tarjeta" class="text-indigo-600 focus:ring-indigo-500">
            <span class="text-xs mt-1 font-medium">Tarjeta</span>
          </label>
          <label class="flex flex-col items-center justify-center p-3 border rounded-lg cursor-pointer hover:bg-slate-50 transition border-slate-200">
            <input type="radio" name="medio_pago" value="Transferencia" class="text-indigo-600 focus:ring-indigo-500">
            <span class="text-xs mt-1 font-medium">Transf.</span>
          </label>
        </div>
      </div>

      <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-150 shadow-sm">
        Guardar Vale de Servicio
      </button>
    </form>
  </div>

  <div class="text-center text-xs text-slate-400 py-4">
    Alineaciones Bustamante © 2026
  </div>

  <script>
    // Inicializar Supabase
    const SUPABASE_URL = "https://okkydrwdexacxvfbtopb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_XY2XRiAQw4tQdygSAwd4XA_pRETQ_EA";
    const { createClient } = supabase;

    const client = createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY
    );

    // Elementos DOM
    const loginModal = document.getElementById('loginModal');
    const loginForm = document.getElementById('loginForm');
    const btnCerrarSesion = document.getElementById('btnCerrarSesion');
    const form = document.getElementById('registroForm');
    const inputNeto = document.getElementById('valor_neto');
    const inputTotal = document.getElementById('valor_total');

    // --- 1. LÓGICA DE SESIÓN Y AUTENTICACIÓN ---
    async function verificarSesion() {
      const { data: { session } } = await client.auth.getSession();
      if (session) {
        loginModal.classList.add('hidden');
      } else {
        loginModal.classList.remove('hidden');
      }
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      const { data, error } = await client.auth.signInWithPassword({ email, password });

      if (error) {
        alert('Credenciales incorrectas: ' + error.message);
      } else {
        loginModal.classList.add('hidden');
      }
    });

    btnCerrarSesion.addEventListener('click', async () => {
      await client.auth.signOut();
      window.location.reload();
    });

    // Validar sesión al cargar
    verificarSesion();

    // --- 2. CÁLCULO AUTOMÁTICO DE IVA (19%) ---

    // 1. Si el usuario escribe en VALOR NETO -> Calcula el Total
    inputNeto.addEventListener('input', () => {
      const neto = parseFloat(inputNeto.value) || 0;
      if (neto > 0) {
        inputTotal.value = Math.round(neto * 1.19);
      } else {
        inputTotal.value = '';
      }
    });
    // 2. Si el usuario escribe en VALOR TOTAL -> Calcula el Neto
    inputTotal.addEventListener('input', () => {
      const total = parseFloat(inputTotal.value) || 0;
      if (total > 0) {
        inputNeto.value = Math.round(total / 1.19);
      } else {
        inputNeto.value = '';
      }
    });

    // --- 3. GUARDAR NUEVO REGISTRO ---
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Consultar último folio registrado para dar continuidad
      const { data: ultimasOrdenes, error: errorFolio } = await client
        .from('ordenes')
        .select('id')
        .order('id', { ascending: false })
        .limit(1);

      if (errorFolio) {
        alert('Error al consultar correlativo: ' + errorFolio.message);
        return;
      }

      let siguienteFolio = 12900;
      if (ultimasOrdenes && ultimasOrdenes.length > 0) {
        const ultimoId = ultimasOrdenes[0].id;
        if (ultimoId >= 12900) {
          siguienteFolio = ultimoId + 1;
        }
      }

      const datos = {
        id: siguienteFolio,
        nombre_empresa: document.getElementById('nombre_empresa').value,
        marca: document.getElementById('marca').value,
        patente: document.getElementById('patente').value.toUpperCase().trim(),
        detalle: document.getElementById('detalle').value,
        valor_neto: parseFloat(inputNeto.value),
        valor_total: parseFloat(inputTotal.value),  
        medio_pago: document.querySelector('input[name="medio_pago"]:checked').value
      };

      const { data, error } = await client
        .from('ordenes')
        .insert([datos])
        .select();

      if (error) {
        alert('Error al guardar: ' + error.message);
      } else {
        alert(`¡Vale Guardado! Folio Vale:#${data[0].id}`);
        form.reset();
      }
    });
  </script>
</body>
</html>
