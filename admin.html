<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración</title>
  <link rel="icon" type="image/png" href="logooriginal.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col justify-between p-4">

  <!-- Modal de Autenticación Genérico -->
  <div id="loginModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white p-6 rounded-2xl shadow-xl max-w-sm w-full border border-slate-200">
      <div class="text-center mb-6">
        <div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-3 font-bold text-xl">🔑</div>
        <h2 class="text-lg font-bold text-slate-900">Acceso al Sistema</h2>
        <p class="text-xs text-slate-500">Ingresa con tus credenciales del taller</p>
      </div>
      
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase">Token</label>
          <input type="email" id="loginEmail" required class="mt-1 w-full rounded-lg border-slate-300 p-2.5 border text-sm focus:ring-indigo-500" placeholder="usuario@taller.cl">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase">Contraseña</label>
          <input type="password" id="loginPassword" required class="mt-1 w-full rounded-lg border-slate-300 p-2.5 border text-sm focus:ring-indigo-500" placeholder="••••••••">
        </div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg text-sm transition shadow-sm">
          Iniciar Sesión
        </button>
      </form>
    </div>
  </div>

  <div class="w-full max-w-6xl mx-auto space-y-6">
    <!-- Encabezado con botones de navegación y sesión -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
      <div>
        <h1 class="text-xl font-bold text-slate-900">Panel de Control de Vales</h1>
        <p class="text-xs text-slate-500">Historial, filtros y eliminación de registros</p>
      </div>
      <div class="flex items-center gap-2">
        <button id="btnCerrarSesion" class="text-xs bg-red-100 hover:bg-red-200 text-red-700 px-3 py-2 rounded-lg font-medium transition shadow-sm">
          🚪 Cerrar Sesión
        </button>
        <a href="index.html" class="inline-flex items-center gap-1.5 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition shadow-sm">
          ⬅️ Regresar a Vales
        </a>
      </div>
    </div>

    <!-- Filtros de búsqueda -->
    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col md:flex-row gap-3">
      <input type="text" id="buscarGeneral" placeholder="Buscar patente o empresa..." class="flex-grow rounded-lg border-slate-300 p-2.5 border text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
      
      <select id="filtrarPago" class="rounded-lg border-slate-300 p-2.5 border text-sm text-slate-600 bg-white focus:border-indigo-500">
        <option value="Todos">Todos los pagos</option>
        <option value="Efectivo">Efectivo</option>
        <option value="Tarjeta">Tarjeta</option>
        <option value="Transferencia">Transferencia</option>
      </select>

      <button onclick="exportarExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2.5 rounded-lg text-sm font-semibold transition shadow-sm inline-flex items-center gap-2">
        📥 Exportar Excel
      </button>
    </div>

    <!-- Tabla de órdenes -->
    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
      <h2 class="text-md font-bold text-slate-900 mb-4">Vales Registrados</h2>
      <div class="overflow-x-auto rounded-lg border border-slate-200">
        <table class="min-w-full divide-y divide-slate-200">
          <thead class="bg-slate-50">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Folio</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Fecha</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Empresa / Patente</th>
              <th class="p-3 text-right">Neto</th> 
              <th class="p-3 text-right">Total</th>   
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Medio Pago</th>
              <th class="px-4 py-3 text-center text-xs font-semibold text-slate-500 uppercase">Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaBody" class="bg-white divide-y divide-slate-200">
            <!-- Cargado dinámicamente -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="text-center text-xs text-slate-400 py-4">
    Alineaciones Bustamante © 2026
  </div>

  <script>
    // Inicializar Supabase
    const SUPABASE_URL = "https://okkydrwdexacxvfbtopb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_XY2XRiAQw4tQdygSAwd4XA_pRETQ_EA";

    const { createClient } = supabase;

    const client = createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    // Elementos DOM
    const loginModal = document.getElementById('loginModal');
    const loginForm = document.getElementById('loginForm');
    const btnCerrarSesion = document.getElementById('btnCerrarSesion');
    const tablaBody = document.getElementById('tablaBody');
    const buscarGeneralInput = document.getElementById('buscarGeneral');
    const filtrarPagoSelect = document.getElementById('filtrarPago');

    // --- 1. CONTROL DE SESIÓN Y AUTENTICACIÓN ---
    async function verificarSesion() {
      const { data: { session } } = await client.auth.getSession();
      if (session) {
        loginModal.classList.add('hidden');
        cargarRegistros();
      } else {
        loginModal.classList.remove('hidden');
      }
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      const { data, error } = await client.auth.signInWithPassword({ email, password });

      if (error) {
        alert('Credenciales incorrectas: ' + error.message);
      } else {
        loginModal.classList.add('hidden');
        cargarRegistros();
      }
    });

    btnCerrarSesion.addEventListener('click', async () => {
      await client.auth.signOut();
      window.location.reload();
    });

    // Inicializar listeners y verificación
    document.addEventListener('DOMContentLoaded', () => {
      verificarSesion();
      buscarGeneralInput.addEventListener('input', cargarRegistros);
      filtrarPagoSelect.addEventListener('change', cargarRegistros);
    });

    // --- 2. LEER Y FILTRAR REGISTROS (CRUD: READ) ---
    async function cargarRegistros() {
      let query = client
        .from('ordenes')
        .select('*')
        .order('id', { ascending: false });

      const busqueda = buscarGeneralInput.value.trim();
      if (busqueda) {
        query = query.or(`patente.ilike.%${busqueda}%,nombre_empresa.ilike.%${busqueda}%`);
      }

      const pagoFiltro = filtrarPagoSelect.value;
      if (pagoFiltro !== 'Todos') {
        query = query.eq('medio_pago', pagoFiltro);
      }

      const { data: ordenes, error } = await query;

      if (error) {
        console.error('Error al cargar datos:', error);
        return;
      }

      tablaBody.innerHTML = '';

      if (!ordenes || ordenes.length === 0) {
        tablaBody.innerHTML = `<tr><td colspan="6" class="p-4 text-center text-sm text-slate-400">No se encontraron órdenes registradas.</td></tr>`;
        return;
      }

      ordenes.forEach(o => {
        const fechaFormateada = o.created_at ? new Date(o.created_at).toLocaleDateString('es-CL') : 'N/A';
        const tr = document.createElement('tr');
        tr.className = "hover:bg-slate-50 transition";
        tr.innerHTML = `
          <td class="px-4 py-3 text-sm font-semibold text-slate-900">#${o.id}</td>
          <td class="px-4 py-3 text-sm text-slate-500">${fechaFormateada}</td>
          <td class="px-4 py-3 text-sm">
            <div class="font-medium text-slate-900">${o.nombre_empresa}</div>
            <div class="text-xs text-slate-500">${o.marca} - <span class="font-semibold text-indigo-600">${o.patente}</span></div>
          </td>
          <td class="px-4 py-3 text-sm font-medium text-slate-600">$${(o.valor_neto || 0).toLocaleString('es-CL')}</td>
          <td class="px-4 py-3 text-sm font-bold text-slate-900">$${(o.valor_total || 0).toLocaleString('es-CL')}</td>
          <td class="px-4 py-3 text-sm">
            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${
              o.medio_pago === 'Efectivo' ? 'bg-green-100 text-green-800' :
              o.medio_pago === 'Tarjeta' ? 'bg-blue-100 text-blue-800' : 'bg-purple-100 text-purple-800'
            }">${o.medio_pago}</span>
          </td>
          <td class="px-4 py-3 text-sm text-center">
            <button onclick="eliminarRegistro(${o.id})" class="text-red-600 hover:text-red-900 font-medium text-xs bg-red-50 hover:bg-red-100 px-2.5 py-1.5 rounded-md transition">
              Eliminar
            </button>
          </td>
        `;
        tablaBody.appendChild(tr);
      });
    }

    // --- 3. ELIMINAR REGISTRO (CRUD: DELETE) ---
    async function eliminarRegistro(id) {
      if (!confirm(`¿Está seguro de que desea eliminar la orden #${id}?`)) return;

      const { error } = await client
        .from('ordenes')
        .delete()
        .eq('id', id);

      if (error) {
        alert('Error al eliminar: ' + error.message);
      } else {
        alert('Orden eliminada correctamente.');
        cargarRegistros();
      }
    }

    // --- 4. EXPORTAR A EXCEL (CSV) ---
    async function exportarExcel() {
      const { data: ordenes, error } = await client
        .from('ordenes')
        .select('*')
        .order('id', { ascending: false });

      if (error) {
        alert('Error al obtener datos para exportar.');
        return;
      }

      let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
      csvContent += "Folio;Fecha;Empresa;Marca;Patente;Detalle;Neto;Total;Medio Pago\n";

      ordenes.forEach(o => {
        const fecha = o.created_at ? new Date(o.created_at).toLocaleDateString('es-CL') : 'N/A';
        csvContent += `${o.id};${fecha};"${o.nombre_empresa}";"${o.marca}";"${o.patente}";"${o.detalle || ''}";${o.valor_neto || 0};${o.valor_total || 0};"${o.medio_pago}"\n`;
      });

      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", `Ordenes_Trabajo_${new Date().toLocaleDateString('es-CL')}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
